services:
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: oracledb
    ports:
      - "1521:1521"

    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}

    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init:/container-entrypoint-initdb.d

    restart: unless-stopped

volumes:
  oracle_data:
